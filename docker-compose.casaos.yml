name: farmasi-app

services:
  farmasi-app:
    image: ghcr.io/mentionabbe-wq/farmasi-app:latest
    container_name: farmasi-app
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/farmasi-app/data:/app/data
      - /DATA/AppData/farmasi-app/uploads:/app/uploads
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main: farmasi-app
  description:
    en_us: >-
      Pharmacy Daily Notes — manage monthly budget, drug purchases, stock
      mutations to inpatient/outpatient pharmacy, daily sales by category
      (BPJS, General, Insurance), document archive (SOP, incident reports),
      and export recap to Excel.
    id_id: >-
      Catatan Harian Farmasi — kelola anggaran bulanan, pembelian obat,
      mutasi stok ke farmasi ranap/ralan, penjualan harian per kategori
      (BPJS, Umum, Asuransi), arsip dokumen (SPO, kronologi), dan
      download rekap ke Excel.
  tagline:
    en_us: Pharmacy management, simplified
    id_id: Manajemen farmasi yang mudah dan lengkap
  developer: mentionabbe-wq
  author: mentionabbe-wq
  icon: https://raw.githubusercontent.com/mentionabbe-wq/farmasi-app/main/public/icon.svg
  thumbnail: ""
  title:
    en_us: Farmasi App
    id_id: Aplikasi Farmasi
  category: Utilities
  port_map: "3000"
  scheme: http
  index: /
  tips:
    before_install:
      en_us: >-
        Data is saved in /DATA/AppData/farmasi-app/ on your CasaOS host.
        It persists across updates and restarts.
      id_id: >-
        Data tersimpan di /DATA/AppData/farmasi-app/ di host CasaOS Anda.
        Data tetap aman saat update atau restart container.
