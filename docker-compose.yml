version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - farmasi_data:/app/data
      - farmasi_uploads:/app/uploads
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped

volumes:
  farmasi_data:
  farmasi_uploads:
