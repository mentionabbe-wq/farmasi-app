<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#1D9E75"/>
  <!-- pill / capsule shape -->
  <g transform="translate(256,256)">
    <!-- capsule body rotated 45deg -->
    <rect x="-140" y="-52" width="280" height="104" rx="52" fill="white" transform="rotate(-45)"/>
    <!-- left half of pill (green) -->
    <path d="M 0,-98 A 52,52 0 0,0 0,0 L 0,-98 Z" fill="#1D9E75" transform="rotate(135) translate(0,0)"/>
    <rect x="-52" y="-99" width="52" height="199" fill="#1D9E75" transform="rotate(-45)"/>
    <!-- dividing line -->
    <line x1="0" y1="-99" x2="0" y2="99" stroke="white" stroke-width="6" transform="rotate(-45)"/>
    <!-- plus sign -->
    <rect x="-14" y="-50" width="28" height="100" rx="6" fill="white" opacity="0.9" transform="rotate(45)"/>
    <rect x="-50" y="-14" width="100" height="28" rx="6" fill="white" opacity="0.9" transform="rotate(45)"/>
  </g>
</svg>
